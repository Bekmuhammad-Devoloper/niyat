name: Deploy to GCE server

on:
  push:
    branches:
      - feature/kaaba-qibla-admin
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gce
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Show deployment info
        run: |
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ github.sha }}"
          echo "Author:  ${{ github.actor }}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          BRANCH: ${{ github.ref_name }}
        run: |
          ssh -o StrictHostKeyChecking=no "${SERVER_USER}@${SERVER_HOST}" bash -s <<ENDSSH
          set -e
          cd /home/bekmuhammad_devoloper/niyat

          echo "=== 1) Git yangilash ==="
          git fetch niyat
          git reset --hard "niyat/${BRANCH}"
          git log -1 --oneline

          echo "=== 2) Dependencies ==="
          if ! git diff --quiet HEAD@{1} HEAD -- package.json package-lock.json 2>/dev/null; then
            echo "package.json o'zgargan — npm install ishga tushyapti..."
            npm ci
          else
            echo "package.json o'zgarmagan — o'tkazib yuborildi"
          fi

          echo "=== 3) Build ==="
          npm run build 2>&1 | tail -5

          echo "=== 4) Service restart ==="
          systemctl restart niyat
          sleep 8

          echo "=== 5) Health check ==="
          STATUS=\$(systemctl is-active niyat)
          echo "Service: \$STATUS"
          if [ "\$STATUS" != "active" ]; then
            echo "❌ Service active emas!"
            exit 1
          fi

          HTTP=\$(curl -sI -o /dev/null -w "%{http_code}" https://my.niyat.tech)
          echo "HTTP:    \$HTTP"
          if [ "\$HTTP" != "200" ] && [ "\$HTTP" != "304" ]; then
            echo "❌ HTTP javob: \$HTTP"
            exit 1
          fi

          echo "✅ Deploy muvaffaqiyatli — https://my.niyat.tech"
          ENDSSH
