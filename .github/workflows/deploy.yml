name: Deploy to GCE server

on:
  push:
    branches:
      - feature/kaaba-qibla-admin
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gce
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Show deployment info
        run: |
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ github.sha }}"
          echo "Author:  ${{ github.actor }}"

      - name: Verify secrets are set
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER_NAME: ${{ secrets.SERVER_USER }}
        run: |
          if [ -z "$HOST" ]; then echo "❌ SERVER_HOST sekret yo'q"; exit 1; fi
          if [ -z "$USER_NAME" ]; then echo "❌ SERVER_USER sekret yo'q"; exit 1; fi
          echo "✓ Sekretlar mavjud"
          echo "  HOST uzunligi: ${#HOST}"
          echo "  USER uzunligi: ${#USER_NAME}"

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        env:
          HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Write deploy script
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          cat > /tmp/deploy.sh <<DEPLOY_SCRIPT
          #!/bin/bash
          set -e
          cd /home/bekmuhammad_devoloper/niyat

          # Root foydalanuvchi sifatida ishga tushyapmiz, lekin papka egasi
          # bekmuhammad_devoloper — git buni shubhali deb biladi. Trust deb belgilash.
          git config --global --add safe.directory /home/bekmuhammad_devoloper/niyat 2>/dev/null || true

          echo "=== 1) Git yangilash ==="
          git fetch origin
          git reset --hard origin/${BRANCH}
          git log -1 --oneline

          echo "=== 2) Dependencies ==="
          if ! git diff --quiet HEAD@{1} HEAD -- package.json package-lock.json 2>/dev/null; then
            echo "package.json o'zgargan — npm ci..."
            npm ci
          else
            echo "package.json o'zgarmagan — o'tkazib yuborildi"
          fi

          echo "=== 3) Build ==="
          npm run build 2>&1 | tail -5

          echo "=== 4) .dev.vars sanity ==="
          echo "Path:    /home/bekmuhammad_devoloper/niyat/.dev.vars"
          echo "Exists:  \$(test -f .dev.vars && echo yes || echo no)"
          echo "Lines:   \$(wc -l < .dev.vars 2>/dev/null || echo 0)"
          echo "Owner:   \$(stat -c '%U:%G mode=%a' .dev.vars 2>/dev/null || echo unknown)"
          echo "Keys:    \$(grep -E '^[A-Z_]+=' .dev.vars 2>/dev/null | sed 's/=.*//' | sort | tr '\n' ' ')"

          echo "=== 5) Service restart ==="
          sudo -n systemctl restart niyat || systemctl restart niyat || true
          sleep 5

          echo "=== 6) Service status ==="
          set +e
          STATUS=\$(systemctl is-active niyat 2>&1)
          RC=\$?
          set -e
          echo "Service: \$STATUS (rc=\$RC)"

          if [ "\$STATUS" != "active" ]; then
            echo ""
            echo "=== Service did NOT come up. Diagnostic dump: ==="
            echo "--- systemctl status ---"
            sudo -n systemctl status niyat --no-pager 2>&1 | tail -30 || systemctl status niyat --no-pager 2>&1 | tail -30 || true
            echo "--- journalctl last 80 ---"
            sudo -n journalctl -u niyat -n 80 --no-pager 2>&1 || journalctl -u niyat -n 80 --no-pager 2>&1 || echo "(journal unreadable)"
            exit 1
          fi

          echo "=== 7) HTTP health check ==="
          # Wrangler workerd cold start 10-20 sek olishi mumkin. Bir necha bor urinamiz.
          HTTP=000
          for i in 1 2 3 4 5 6 7 8; do
            HTTP=\$(curl -sI -o /dev/null -w "%{http_code}" --max-time 8 https://my.niyat.tech || echo 000)
            echo "Try \$i: HTTP \$HTTP"
            [ "\$HTTP" = "200" ] || [ "\$HTTP" = "304" ] && break
            sleep 4
          done
          if [ "\$HTTP" != "200" ] && [ "\$HTTP" != "304" ]; then
            echo ""
            echo "=== HTTP failed after retries. Recent journal: ==="
            sudo -n journalctl -u niyat -n 60 --no-pager 2>&1 || journalctl -u niyat -n 60 --no-pager 2>&1 || echo "(journal unreadable)"
            exit 1
          fi

          echo "Deploy OK — https://my.niyat.tech"
          DEPLOY_SCRIPT
          chmod +x /tmp/deploy.sh
          echo "✓ deploy.sh yozildi"
          echo "--- birinchi 5 qator ---"
          head -5 /tmp/deploy.sh

      # Server'dagi .env ni yangilash — har kalit alohida yangilanadi.
      # Qolgan sozlamalar (GEMINI, TELEGRAM, va h.k.) tegmagan holda saqlanadi.
      # Kalit qiymatlari SSH stdin orqali uzatiladi — buyruq satrida ko'rinmaydi.
      - name: Update server .env with GitHub Secrets
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER_NAME: ${{ secrets.SERVER_USER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Avval CI loglarida har sekret bormi ko'rsatamiz (qiymat emas, faqat
          # uzunlik). Bo'sh bo'lsa sezamiz nimaga server tomon ham bo'sh.
          echo "── Secret diagnostic (CI side) ──"
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          echo ""

          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️  OPENAI_API_KEY GitHub Secret BO'SH — .env'ga yozilmaydi!"
            echo "    GitHub → Settings → Secrets → Actions → OPENAI_API_KEY ni tekshiring"
          fi

          # Har bir sekret uchun "NAME=VALUE" satrini qator-qator stdin ga yozamiz.
          {
            [ -n "$OPENAI_API_KEY" ] && printf 'OPENAI_API_KEY=%s\n' "$OPENAI_API_KEY"
            [ -n "$ANTHROPIC_API_KEY" ] && printf 'ANTHROPIC_API_KEY=%s\n' "$ANTHROPIC_API_KEY"
          } | ssh -o StrictHostKeyChecking=no "${USER_NAME}@${HOST}" '
            set -e
            cd /home/bekmuhammad_devoloper/niyat
            echo "[diag] pwd: $(pwd)"
            echo "[diag] whoami: $(id -un):$(id -gn)"
            echo "[diag] dir owner: $(stat -c "%U:%G %a" .)"
            echo "[diag] before existing files:"
            ls -la .dev.vars .env 2>&1 | sed "s/^/    /" || true

            # systemd unit User= qiymatini topamiz
            UNIT_USER=root
            for UNIT in /etc/systemd/system/niyat.service /lib/systemd/system/niyat.service; do
              if [ -f "$UNIT" ]; then
                U=$(grep -E "^User=" "$UNIT" 2>/dev/null | tail -1 | sed "s/^User=//" | tr -d "[:space:]")
                [ -n "$U" ] && UNIT_USER="$U"
                break
              fi
            done
            echo "[diag] systemd User= $UNIT_USER"

            # Mavjud .dev.vars mazmunini ishchi buferga o-qiymiz (eski GEMINI va
            # boshqa kalitlarni yo-qotmaslik uchun). Boshqa egasiniki bo-lsa sudo
            # bilan o-qishga urinamiz.
            WORK=$(mktemp)
            if [ -f .dev.vars ]; then
              if cat .dev.vars > "$WORK" 2>/dev/null; then
                echo "[diag] read existing .dev.vars: $(wc -l < $WORK) lines"
              else
                sudo -n cat .dev.vars > "$WORK" 2>/dev/null || : > "$WORK"
                echo "[diag] read existing (with sudo or empty): $(wc -l < $WORK) lines"
              fi
            else
              echo "[diag] no existing .dev.vars; starting empty"
            fi

            # GitHub Secret stdin dan kelgan yangi kalitlarni qo-shamiz/almashtiramiz
            UPDATED=""
            while IFS= read -r LINE; do
              [ -z "$LINE" ] && continue
              KEY="${LINE%%=*}"
              [ -z "$KEY" ] && continue
              # Eski qatorni olib tashlash
              grep -v "^${KEY}=" "$WORK" > "${WORK}.new" 2>/dev/null || : > "${WORK}.new"
              mv -f "${WORK}.new" "$WORK"
              # Yangi qiymatni qo-shish
              printf "%s\n" "$LINE" >> "$WORK"
              UPDATED="$UPDATED $KEY"
            done
            echo "[diag] updated keys via secrets:${UPDATED:-(none)}"
            echo "[diag] merged buffer keys: $(grep -E "^[A-Z_]+=" "$WORK" | sed "s/=.*//" | sort | tr "\n" " ")"

            # Atomar yozish — .dev.vars va .env ga buferdan ko-chirish.
            # Eski faylni boshqa user ega bo-lsa cp ustiga yozolmaymiz; oldin rm.
            for TARGET in .dev.vars .env; do
              if [ -e "$TARGET" ] && [ ! -w "$TARGET" ]; then
                sudo -n rm -f "$TARGET" 2>/dev/null || rm -f "$TARGET" 2>/dev/null || true
              fi
              cp "$WORK" "$TARGET"
            done
            rm -f "$WORK"

            # Ruxsat: niyat.service User=UNIT_USER fayl yozish bilan ham kerak
            # boladi (wrangler dev hot reload uchun lock oladi). Egasini UNIT_USER
            # qilishga urinamiz, bo-lmasa group orqali, bo-lmasa 666 oxirgi chora.
            CHOWN_OK=no
            if [ "$UNIT_USER" = "$(id -un)" ]; then
              CHOWN_OK=same-user
            else
              if sudo -n chown "$UNIT_USER:$UNIT_USER" .dev.vars .env 2>/dev/null; then
                CHOWN_OK=chown
              elif chgrp "$UNIT_USER" .dev.vars .env 2>/dev/null; then
                CHOWN_OK=chgrp
              fi
            fi
            echo "[diag] ownership strategy: $CHOWN_OK"

            case "$CHOWN_OK" in
              same-user|chown) chmod 644 .dev.vars .env ;;
              chgrp)           chmod 664 .dev.vars .env ;;
              *)               chmod 666 .dev.vars .env ;;
            esac

            echo "[diag] final .dev.vars: $(stat -c "%U:%G %a %s_bytes" .dev.vars) keys=$(grep -E "^[A-Z_]+=" .dev.vars | sed "s/=.*//" | sort | tr "\n" " ")"
            echo "[diag] final .env:      $(stat -c "%U:%G %a %s_bytes" .env)      keys=$(grep -E "^[A-Z_]+=" .env | sed "s/=.*//" | sort | tr "\n" " ")"
            echo "OK env update complete"
          '

      - name: Run deploy on server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER_NAME: ${{ secrets.SERVER_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no "${USER_NAME}@${HOST}" 'bash -s' < /tmp/deploy.sh
