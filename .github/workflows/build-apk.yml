name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - feature/kaaba-qibla-admin
    tags:
      - "v*"
    paths:
      - "src/**"
      - "mobile/**"
      - "android/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.mobile.ts"
      - "capacitor.config.ts"
      - ".github/workflows/build-apk.yml"

env:
  # Production API endpoint — APK shu URL'ga so'rov yuboradi
  VITE_API_BASE: https://my.niyat.tech
  VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build mobile web (Vite SPA)
        run: npm run build:mobile

      - name: Generate Android icons from logo
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Sync Capacitor (Android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          SAFE_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/niyat-${SAFE_NAME}-${{ github.run_number }}.apk
          ls -la artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: niyat-apk-${{ github.run_number }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Show APK info
        run: |
          echo "✅ APK tayyor"
          echo ""
          echo "Yuklab olish: Actions → bu run → Artifacts bo'limi"
          echo "Yoki to'g'ridan-to'g'ri quyidagi havoladan:"
          echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "VITE_API_BASE: $VITE_API_BASE"
          du -h artifacts/*.apk

      - name: Create Release (tag bo'lsa)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          name: "Niyat ${{ github.ref_name }}"
          body: |
            Niyat Android APK — debug build.

            **API endpoint:** ${{ env.VITE_API_BASE }}

            **Telefon o'rnatish:**
            1. APK'ni yuklab oling
            2. Telefon Settings → Security → "Unknown sources" yoqing
            3. APK fayl bosib o'rnating

            **Eslatma:** Bu debug build — Google Play uchun release signing kerak.
          draft: false
          prerelease: false
